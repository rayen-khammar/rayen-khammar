<text x="28" y="66" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="13"><tspan fill="#4ade80">rayen</tspan><tspan fill="#5c6773">@</tspan><tspan fill="#5eead4">insat</tspan><tspan fill="#5c6773">:~$ </tspan><tspan fill="#d3dce6">tail -f volunteering.log</tspan></text><rect x="320" y="54" width="8" height="15" fill="#5eead4">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.5;0.51;1;1" dur="1s" repeatCount="indefinite"/>
  </rect><circle cx="34" cy="104" r="3.5" fill="#f2c14e"/><line x1="34" y1="110" x2="34" y2="168" stroke="#1e2732" stroke-width="1.5"/><text x="52" y="109" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#5eead4">2025.09 — 2026.07</text><text x="52" y="130" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="15" font-weight="700" fill="#d3dce6">Vice Chairman<tspan fill="#5c6773" font-weight="400"> — IEEE INSAT Computer Society Chapter</tspan></text><text x="52" y="152" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="12.5" fill="#d3dce6" opacity="0.85">Leading a 300+ member chapter — workshops, recruitment, large-scale events.</text><circle cx="34" cy="182" r="3.5" fill="#f2c14e"/><line x1="34" y1="188" x2="34" y2="246" stroke="#1e2732" stroke-width="1.5"/><text x="52" y="187" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#5eead4">2024.12 — 2025.06</text><text x="52" y="208" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="15" font-weight="700" fill="#d3dce6">Event Content Manager<tspan fill="#5c6773" font-weight="400"> — AINS 3.0 · IEEE CS INSAT</tspan></text><text x="52" y="230" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="12.5" fill="#d3dce6" opacity="0.85">Managed event printables, branded merch, and live AV direction.</text><circle cx="34" cy="260" r="3.5" fill="#f2c14e"/><line x1="34" y1="266" x2="34" y2="324" stroke="#1e2732" stroke-width="1.5"/><text x="52" y="265" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#5eead4">2022</text><text x="52" y="286" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="15" font-weight="700" fill="#d3dce6">Media Manager<tspan fill="#5c6773" font-weight="400"> — TEDxYouth@LyceePiloteSfax</tspan></text><text x="52" y="308" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="12.5" fill="#d3dce6" opacity="0.85">Led visual production — promo graphics and social content — for a licensed TEDx event.</text><circle cx="34" cy="338" r="3.5" fill="#f2c14e"/><text x="52" y="343" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" fill="#5eead4">2020 — 2023</text><text x="52" y="364" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="15" font-weight="700" fill="#d3dce6">Graphic Designer<tspan fill="#5c6773" font-weight="400"> — Microsoft Technology Club LPS</tspan></text><text x="52" y="386" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="12.5" fill="#d3dce6" opacity="0.85">Designed social content and merch; ran 2 Photoshop/design workshops.</text></svg>
